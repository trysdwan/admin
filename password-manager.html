<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Password Manager - Full Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: #f0f5fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f5b9c 0%, #1a4b7a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-content p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        }
        
        /* Error message styling */
        .error-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 1001;
            max-width: 400px;
            border-left: 4px solid #ef4444;
        }
        
        .error-message i {
            font-size: 3rem;
            color: #ef4444;
            margin-bottom: 15px;
        }
        
        .error-message h3 {
            margin-bottom: 10px;
            color: #1e293b;
        }
        
        .error-message p {
            color: #64748b;
            margin-bottom: 20px;
        }
        
        .error-message a {
            background: linear-gradient(135deg, #0f5b9c 0%, #1a4b7a 100%);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
        }
        
        .error-message a:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 91, 156, 0.3);
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>Loading Password Manager...</p>
        </div>
    </div>
    
    <!-- Error Message (hidden by default) -->
    <div class="error-message" id="errorMessage">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <h3>Unable to Load Application</h3>
        <p>Please check your internet connection and try again.</p>
        <a href="#" onclick="retryLoad()">Retry</a>
    </div>
    
    <!-- Iframe Container -->
    <div class="iframe-container">
        <iframe 
            id="appFrame"
            src="https://script.google.com/macros/s/AKfycbyTRTxgRdCPO5eFukvtIhCmujc3z1BYXDejL46nrHa0G1dzuAalTYDnq2kKoOEeXsGM/exec"
            title="Password Manager"
            allow="clipboard-read; clipboard-write"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-popups-to-escape-sandbox">
        </iframe>
    </div>
    
    <script>
        const iframe = document.getElementById('appFrame');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorMessage = document.getElementById('errorMessage');
        let loadTimeout;
        
        // Hide loading overlay when iframe loads
        iframe.addEventListener('load', function() {
            clearTimeout(loadTimeout);
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                loadingOverlay.style.display = 'none';
            }, 500);
        });
        
        // Handle iframe load error
        iframe.addEventListener('error', function() {
            clearTimeout(loadTimeout);
            loadingOverlay.style.display = 'none';
            errorMessage.style.display = 'block';
        });
        
        // Set timeout for loading (if iframe takes too long)
        loadTimeout = setTimeout(function() {
            if (loadingOverlay.style.display !== 'none') {
                loadingOverlay.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        }, 10000);
        
        // Retry function
        function retryLoad() {
            errorMessage.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            loadingOverlay.style.opacity = '1';
            
            // Reload iframe
            iframe.src = iframe.src;
            
            // Reset timeout
            clearTimeout(loadTimeout);
            loadTimeout = setTimeout(function() {
                if (loadingOverlay.style.display !== 'none') {
                    loadingOverlay.style.display = 'none';
                    errorMessage.style.display = 'block';
                }
            }, 10000);
        }
        
        // Add visibility change listener to handle page visibility
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden && iframe.contentWindow) {
                // Page became visible again
                console.log('Page visible');
            }
        });
        
        // Log any console messages from iframe (for debugging)
        window.addEventListener('message', function(event) {
            // Optional: handle messages from iframe
            console.log('Message from iframe:', event.data);
        });
    </script>
</body>
</html>
