<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Asset Manager | PC Asset & IP Registry</title>
    
    <!-- Local CSS Resources (matching attached structure) -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="../css/select2.min.css">
    <link rel="stylesheet" href="../css/select2-bootstrap-5-theme.min.css">
    <link rel="stylesheet" href="../css/flatpickr.min.css">
    <link rel="stylesheet" href="../css/sweetalert2.min.css">
    
    <style>
    
    * { box-sizing: border-box; }
    body {
        background: #eef2f7;
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        padding: 20px 16px;
        margin: 0;
    }
    .app-card {
        max-width: 1600px;
        margin: 0 auto;
        background: white;
        border-radius: 28px;
        box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .tab-header {
        display: flex;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        padding: 0 24px;
    }
    .tab-btn {
        padding: 16px 28px;
        font-size: 1rem;
        font-weight: 600;
        background: transparent;
        border: none;
        color: #475569;
        transition: 0.2s;
        border-bottom: 3px solid transparent;
        cursor: pointer;
    }
    .tab-btn i { margin-right: 8px; font-size: 1.1rem; }
    .tab-btn.active {
        color: #1e4a76;
        border-bottom-color: #1e4a76;
        background: white;
    }
    .tab-pane {
        display: none;
        padding: 30px 32px;
        background: white;
    }
    .tab-pane.active-pane {
        display: block;
    }
    .btn-primary-custom {
        background: #0f3b5f;
        border: none;
        padding: 8px 20px;
        font-weight: 600;
        border-radius: 40px;
        transition: 0.2s;
        color: white;
        font-size: 0.9rem;
    }
    .btn-primary-custom:hover:not(:disabled) {
        background: #0a2c46;
        transform: translateY(-1px);
    }
    .action-icons i {
        font-size: 1.2rem;
        margin: 0 5px;
        cursor: pointer;
        transition: 0.1s;
    }
    .action-icons i.bi-pencil-square { color: #3b82f6; }
    .action-icons i.bi-trash3 { color: #dc2626; }
    .action-icons i:hover { opacity: 0.7; transform: scale(1.05);}
    .form-control, .form-select {
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        padding: 6px 10px;
        font-size: 0.85rem;
    }
    /* TABLE-STYLE ROW LAYOUT - HORIZONTAL LABELS */
    .pc-row-table {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f9fafb;
        border-radius: 16px;
        padding: 8px 16px;
        margin-bottom: 8px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s;
        flex-wrap: wrap;
    }
    .pc-row-table:hover {
        background: #f1f5f9;
        border-color: #cbd5e1;
    }
    .field-cell {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1 1 0px;
        min-width: 140px;
    }
    .field-cell .form-label {
        font-weight: 600;
        color: #0f172a;
        font-size: 0.75rem;
        margin-bottom: 0;
        white-space: nowrap;
    }
    .required:after {
        content: "*";
        color: #dc2626;
        margin-left: 4px;
    }
    /* Asset ID group */
    .asset-combiner {
        display: flex;
        align-items: center;
        gap: 6px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        padding: 4px 6px;
        flex: 1;
    }
    .asset-part {
        border: none;
        background: transparent;
        padding: 4px 4px;
        width: 65px;
        text-align: center;
        font-size: 0.85rem;
    }
    .asset-part:focus { outline: none; }
    .asset-sep {
        font-weight: 600;
        color: #475569;
        font-size: 0.8rem;
    }
    /* IP combiner */
    .ip-combiner {
        display: flex;
        align-items: center;
        gap: 4px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        padding: 4px 6px;
        flex: 1;
    }
    .ip-prefix-field {
        border: none;
        background: transparent;
        padding: 4px 4px;
        width: 90px;
        font-size: 0.85rem;
        font-family: monospace;
    }
    .ip-dot {
        font-weight: bold;
        color: #64748b;
    }
    .ip-last-field {
        border: 1px solid #767676;
        background: #fff;
        padding: 4px 4px;
        width: 50px;
        text-align: center;
        font-size: 0.85rem;
    }
    /* Small select fields */
    .small-select-field {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0.3 1 0px;
        min-width: 150px;
    }
    .small-select-field .form-label {
        font-weight: 600;
        font-size: 0.75rem;
        margin-bottom: 0;
        white-space: nowrap;
    }
    .small-select-field .form-select {
        width: 150px;
        padding: 4px 6px;
        font-size: 0.8rem;
    }
    /* Delete button */
    .delete-cell {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
    }
    .delete-row-btn {
        background: #fee2e2;
        border: none;
        color: #dc2626;
        font-size: 1.2rem;
        width: 32px;
        height: 32px;
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
        cursor: pointer;
    }
    .delete-row-btn:hover {
        background: #fecaca;
        transform: scale(1.05);
        color: #b91c1c;
    }
    .add-pc-btn {
        border: 1px dashed #94a3b8;
        background: #f8fafc;
        border-radius: 60px;
        padding: 8px 20px;
        font-weight: 500;
        font-size: 0.85rem;
    }
    .info-banner {
        background: #eef2ff;
        border-radius: 16px;
        padding: 10px 18px;
        margin-bottom: 20px;
        border-left: 5px solid #1e4a76;
        font-size: 0.85rem;
    }
    @media (max-width: 1100px) {
        .pc-row-table { flex-wrap: wrap; }
        .field-cell { min-width: 180px; }
        .tab-pane { padding: 20px; }
    }
    #global-loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        backdrop-filter: blur(3px);
    }
    .modal-content { border-radius: 24px; }
    .badge-success { background-color: #10b981; color: white; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; }
    .badge-secondary { background-color: #64748b; color: white; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; }
    .duplicate-warning {
        color: #dc2626;
        font-size: 0.7rem;
        margin-top: 2px;
        display: none;
    }
    .asset-part3.duplicate {
        border-color: #dc2626;
        background-color: #fee2e2;
    }
    </style>
</head>
<body>
<div class="app-card">
    <div class="tab-header">
        <button class="tab-btn active" id="tabAddBtn"><i class="bi bi-plus-circle"></i> Add </button>
        <button class="tab-btn" id="tabEditBtn"><i class="bi bi-table"></i> Edit / Manage Asset</button>
    </div>
    
    <!-- Tab 1: Table-style rows with horizontal labels -->
    <div id="addPane" class="tab-pane active-pane">
        <h4 class="mb-2 fs-5"><i class="bi bi-pc-display"></i> Asset Register</h4>
        <div class="info-banner" id="branchInfoBanner">
            <i class="bi bi-info-circle-fill"></i> <strong>Branch:</strong> <span id="displayBranchName">—</span> &nbsp;|&nbsp; 
            <strong>DT / Treasury Details:</strong> <span id="displayDistrictTreasury">—</span> &nbsp;|&nbsp;
            <strong>LAN Pool:</strong> <span id="displayLanPool">—</span>
        </div>
        <div id="pcRowsContainer"></div>
        <div class="mt-3 d-flex gap-3 flex-wrap align-items-center">
            <button id="addMorePcBtn" class="btn btn-outline-secondary add-pc-btn"><i class="bi bi-plus-lg"></i> Add New</button>
            <button id="submitAllPcBtn" class="btn btn-primary-custom px-4"><i class="bi bi-cloud-upload"></i> Submit</button>
        </div>
    </div>

    <!-- Tab 2: DataTable -->
    <div id="editPane" class="tab-pane">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h4 class="fs-5"><i class="bi bi-list-ul"></i> Asset List</h4>
            <button id="refreshTableBtn" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table id="assetTable" class="table table-striped table-hover" style="width:100%">
                <thead>
                    <tr><th>ID</th><th>District</th><th>Treasury</th><th>Branch</th><th>Asset ID</th><th>IP Assigned</th><th>Working</th><th>Confirm</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editAssetModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Asset</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editRowId">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">ID</label><input type="text" id="editId" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">District</label><input type="text" id="editDistrict" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Treasury</label><input type="text" id="editTreasury" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Branch</label><input type="text" id="editBranch" class="form-control" readonly></div>
                    <div class="col-md-6"><label class="form-label">Asset ID</label><input type="text" id="editAssetId" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">IP Assigned</label><input type="text" id="editIp" class="form-control"></div>
                    <div class="col-md-3"><label class="form-label">Working Status</label><select id="editWorkingStatus" class="form-select"><option>Yes</option><option>No</option></select></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="confirmAssetUpdateBtn" class="btn btn-primary">Update</button>
            </div>
        </div>
    </div>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap.bundle.min.js"></script>
<script src="../js/jquery.dataTables.min.js"></script>
<script src="../js/dataTables.bootstrap5.min.js"></script>
<script src="../js/select2.min.js"></script>
<script src="../js/sweetalert2.all.min.js"></script>

<script>
    const SPREADSHEET_ID = "1bhkHXrG_eJxpqhSGBu13UyFjmBV7m8lMemDwcQ-4hlI";
    const DATA_SHEET = "Data";
    const SETTINGS_SHEET = "settings";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-mkm6wXOT_mTxj-xoydtMUjUulcYHkF7g2wXBHf__kP7lpXs24eqfidW5By44hf_wpQ/exec";
    let branchFromCache = null;
    let settingsMap = {};
    let allAssets = [];
    let dataTable = null;
    let pcRowCounter = 0;
    let currentBranchCode = "";
    let currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "" };
    let existingAssetIds = new Set(); // Store existing Asset IDs from sheet for duplicate check
    
    function showGlobalLoading(msg) {
        if($('#global-loading-overlay').length) return;
        $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat" style="font-size:48px;color:#0f3b5f;animation:spin 1s linear infinite;"></i><p>${msg}</p></div></div>`);
    }
    function hideGlobalLoading() { $('#global-loading-overlay').remove(); }
    
    function getBranchFromStorage() {
        let branch = null;
        const sessionUser = sessionStorage.getItem('currentUser');
        if (sessionUser) {
            try { const userData = JSON.parse(sessionUser); branch = userData.username; } catch(e) {}
        }
        if (!branch) {
            const localUser = localStorage.getItem('currentUser');
            if (localUser) {
                try { const userData = JSON.parse(localUser); branch = userData.username; } catch(e) {}
            }
        }
        if (!branch) branch = localStorage.getItem('selectedBranch');
        if (!branch) branch = sessionStorage.getItem('selectedBranch');
        return branch;
    }
    
    async function fetchSettings() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SETTINGS_SHEET}!A:D?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            const map = {};
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                const district = row[0] ? row[0].trim() : "";
                const treasury = row[1] ? row[1].trim() : "";
                const branch = row[2] ? row[2].trim() : "";
                const lanPool = row[3] ? row[3].trim() : "";
                if(branch) {
                    map[branch] = { district, treasury, lanPool, branchCodeRaw: branch.length >= 4 ? branch.slice(-4) : branch };
                }
            }
            return map;
        } catch(e) { return {}; }
    }
    
    async function fetchAllAssets() {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${DATA_SHEET}!A2:H?key=${API_KEY}`;
            const resp = await fetch(url);
            const data = await resp.json();
            const rows = data.values || [];
            // Store existing Asset IDs for duplicate check (column E - index 4)
            existingAssetIds.clear();
            rows.forEach(row => {
                if(row[4] && row[4].trim()) {
                    existingAssetIds.add(row[4].trim());
                }
            });
            return rows.map(row => ({
                id: row[0] ? parseInt(row[0]) : null,
                district: (row[1] || "").trim(),
                treasury: (row[2] || "").trim(),
                branch: (row[3] || "").trim(),
                assetId: (row[4] || "").trim(),
                ipAssigned: (row[5] || "").trim(),
                workingStatus: (row[6] || "").trim() === "Yes" ? "Yes" : "No",
                confirm: (row[7] || "").trim() === "Yes" ? "Yes" : "No"
            }));
        } catch(e) { return []; }
    }
    
    function updateBranchInfo() {
        branchFromCache = getBranchFromStorage();
        if (!branchFromCache) {
            $("#displayBranchName").text("⚠️ No Branch Found");
            $("#displayDistrictTreasury").text("Unknown");
            $("#displayLanPool").text("Not available");
            currentBranchCode = "NOD";
            currentSettings = { district: "", treasury: "", lanPool: "", branchCodeRaw: "NOD" };
            return;
        }
        currentSettings = settingsMap[branchFromCache] || { district: "Unknown", treasury: "Unknown", lanPool: "10.165.4.0/24", branchCodeRaw: branchFromCache.slice(-4) };
        $("#displayBranchName").text(branchFromCache);
        $("#displayDistrictTreasury").text(`${currentSettings.district} / ${currentSettings.treasury}`);
        $("#displayLanPool").text(currentSettings.lanPool || "N/A");
        currentBranchCode = currentSettings.branchCodeRaw;
    }
    
    // Function to check duplicate Asset ID within form rows and against existing sheet data
    function checkDuplicateAssetId(part1, part3, excludeRowId = null) {
        if(!part1 || !part3) return false;
        const fullAssetId = `${part1}-NOD-${part3}`;
        
        // Check against existing sheet data
        if(existingAssetIds.has(fullAssetId)) {
            return { duplicate: true, source: "sheet", assetId: fullAssetId };
        }
        
        // Check within current form rows
        let duplicateFound = false;
        $(".pc-row-table").each(function() {
            const $row = $(this);
            const rowPart1 = $row.find(".asset-part1").val().trim();
            const rowPart3 = $row.find(".asset-part3").val().trim();
            const rowId = $row.attr("id");
            
            // Skip the current row being edited if excludeRowId is provided
            if(excludeRowId && rowId === excludeRowId) return;
            
            if(rowPart1 === part1 && rowPart3 === part3) {
                duplicateFound = true;
                return false;
            }
        });
        
        if(duplicateFound) {
            return { duplicate: true, source: "form", assetId: fullAssetId };
        }
        
        return { duplicate: false };
    }
    
    // Real-time duplicate check on asset number input
    function attachRealTimeDuplicateCheck($row) {
        const $part1 = $row.find(".asset-part1");
        const $part3 = $row.find(".asset-part3");
        const $warningSpan = $row.find(".duplicate-warning");
        
        if($warningSpan.length === 0) {
            $row.find(".field-cell:first").append('<span class="duplicate-warning"><i class="bi bi-exclamation-triangle-fill"></i> This Asset ID already exists!</span>');
        }
        
        const checkAndHighlight = function() {
            const part1 = $part1.val().trim();
            const part3 = $part3.val().trim();
            const rowId = $row.attr("id");
            
            if(part1 && part3) {
                const result = checkDuplicateAssetId(part1, part3, rowId);
                if(result.duplicate) {
                    $part3.addClass("duplicate");
                    $row.find(".duplicate-warning").show();
                } else {
                    $part3.removeClass("duplicate");
                    $row.find(".duplicate-warning").hide();
                }
            } else {
                $part3.removeClass("duplicate");
                $row.find(".duplicate-warning").hide();
            }
        };
        
        $part1.on('input', checkAndHighlight);
        $part3.on('input', checkAndHighlight);
    }
    
    function createTableRow(index) {
        let defaultLanPrefix = "10.165.4.";
        if (currentSettings.lanPool) {
            const poolBase = currentSettings.lanPool.split('/')[0];
            const lastDot = poolBase.lastIndexOf('.');
            defaultLanPrefix = lastDot !== -1 ? poolBase.substring(0, lastDot + 1) : poolBase + ".";
        }
        return `
        <div class="pc-row-table" data-row-idx="${index}" id="pc_row_${index}">
            <input type="hidden" class="hidden-district" value="${escapeHtml(currentSettings.district)}">
            <input type="hidden" class="hidden-treasury" value="${escapeHtml(currentSettings.treasury)}">
            <input type="hidden" class="hidden-branch" value="${escapeHtml(branchFromCache || '')}">
            
            <div class="field-cell">
                <label class="form-label required">Asset ID</label>
                <div class="asset-combiner">
                    <input type="text" class="asset-part1" value="${currentBranchCode}" style="width:65px;" readonly>
                    <span class="asset-sep">-NOD-</span>
                    <input type="text" class="asset-part3" placeholder="Number" style="width:70px;">
                </div>
            </div>
            
            <div class="field-cell">
                <label class="form-label required">IP Address</label>
                <div class="ip-combiner">
                    <input type="text" class="ip-prefix-field" value="${defaultLanPrefix}" readonly style="width:90px;">
                    <input type="text" class="ip-last-field" placeholder="octet" value="" style="width:50px;">
                </div>
            </div>
            
            <div class="small-select-field">
                <label class="form-label">Working Status</label>
                <select class="form-select working-select">
                    <option selected>Yes</option><option>No</option>
                </select>
            </div>
            
            <div class="small-select-field" style="display:none">
                <label class="form-label">Confirm</label>
                <select class="form-select confirm-select">
                    <option selected>Yes</option><option>No</option>
                </select>
            </div>
            
            <div class="delete-cell">
                <button type="button" class="delete-row-btn" title="Remove"><i class="bi bi-trash3-fill"></i></button>
            </div>
        </div>`;
    }
    
    function refreshPcRows() {
        $("#pcRowsContainer").empty();
        pcRowCounter = 0;
        addNewTableRow();
    }
    
    function addNewTableRow() {
        if (!branchFromCache) {
            Swal.fire({ icon: 'warning', title: 'No Branch Detected' });
            return;
        }
        const idx = pcRowCounter++;
        const newRow = $(createTableRow(idx));
        $("#pcRowsContainer").append(newRow);
        attachRealTimeDuplicateCheck(newRow);
        newRow.find('.delete-row-btn').on('click', function() {
            $(this).closest('.pc-row-table').remove();
        });
    }
    
    function collectAllRowsData() {
        const records = [];
        let hasError = false;
        let duplicateFound = false;
        
        $(".pc-row-table").each(function() {
            const $row = $(this);
            const district = $row.find(".hidden-district").val();
            const treasury = $row.find(".hidden-treasury").val();
            const branch = $row.find(".hidden-branch").val();
            const part1 = $row.find(".asset-part1").val().trim();
            const part3 = $row.find(".asset-part3").val().trim();
            const ipPrefix = $row.find(".ip-prefix-field").val().trim();
            const ipLast = $row.find(".ip-last-field").val().trim();
            
            if(!part1 || !part3) { 
                hasError = true; 
                Swal.fire("Missing Asset", "Complete Asset ID fields", "warning"); 
                return false; 
            }
            if(!ipLast || isNaN(ipLast) || ipLast < 0 || ipLast > 254) { 
                hasError = true; 
                Swal.fire("Invalid IP", "Last octet must be 1-254", "warning"); 
                return false; 
            }
            
            // Check for duplicate before adding
            const result = checkDuplicateAssetId(part1, part3, $row.attr("id"));
            if(result.duplicate) {
                duplicateFound = true;
                Swal.fire("Duplicate Asset ID", `Asset ID "${result.assetId}" already exists in ${result.source === "sheet" ? "database" : "current list"}!`, "warning");
                return false;
            }
            
            const fullAssetId = `${part1}-NOD-${part3}`;
            const fullIp = ipPrefix.endsWith('.') ? `${ipPrefix}${ipLast}` : `${ipPrefix}.${ipLast}`;
            records.push({
                district, treasury, branch,
                assetId: fullAssetId,
                ipAssigned: fullIp,
                workingStatus: $row.find(".working-select").val(),
                confirm: "Yes"
            });
            return true;
        });
        
        if(hasError || duplicateFound) return null;
        return records;
    }
    
    async function submitBatchRecords(records) {
        if(!records.length) { Swal.fire("Info","No records","info"); return; }
        showGlobalLoading(`Submitting ${records.length}...`);
        let success = 0;
        for(const record of records) {
            try {
                await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "ADD", ...record }) });
                success++;
                // Add to existing set to prevent re-submission within same session
                existingAssetIds.add(record.assetId);
            } catch(e) { console.error(e); }
        }
        hideGlobalLoading();
        Swal.fire({ icon: "success", title: "Saved!", text: `${success} PC(s) added.`, timer: 2000 });
        refreshPcRows();
        await loadAssetsAndRenderTable();
    }
    
    async function deleteAsset(rowId) {
        showGlobalLoading("Deleting...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "DELETE", rowId: parseInt(rowId) }) });
            // Remove from existing set when deleted
            const deletedAsset = allAssets.find(a => a.id === parseInt(rowId));
            if(deletedAsset) {
                existingAssetIds.delete(deletedAsset.assetId);
            }
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Deleted!", timer: 1500 });
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Delete Failed", text: e.message });
        }
    }
    
    async function updateAssetHandler() {
        const rowId = $("#editRowId").val();
        const newAssetId = $("#editAssetId").val().trim();
        const newIp = $("#editIp").val().trim();
        const newWorking = $("#editWorkingStatus").val();
        
        if(!newAssetId || !newIp) { Swal.fire("Error", "Asset ID & IP required", "warning"); return; }
        
        // Check for duplicate when updating (excluding current record)
        const existingRecord = allAssets.find(a => a.id === parseInt(rowId));
        if(existingRecord && existingRecord.assetId !== newAssetId && existingAssetIds.has(newAssetId)) {
            Swal.fire("Duplicate Asset ID", `Asset ID "${newAssetId}" already exists in database!`, "warning");
            return;
        }
        
        showGlobalLoading("Updating...");
        try {
            await fetch(APPS_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({
                action: "UPDATE", rowId: parseInt(rowId), newAssetId, newIp,
                newWorkingStatus: newWorking,
                newConfirm: "Yes"
            }) });
            
            // Update the existing set
            if(existingRecord && existingRecord.assetId !== newAssetId) {
                existingAssetIds.delete(existingRecord.assetId);
                existingAssetIds.add(newAssetId);
            }
            
            hideGlobalLoading();
            Swal.fire({ icon: "success", title: "Updated!", timer: 1500 });
            bootstrap.Modal.getInstance(document.getElementById('editAssetModal')).hide();
            setTimeout(() => loadAssetsAndRenderTable(), 500);
        } catch(e) {
            hideGlobalLoading();
            Swal.fire({ icon: "error", title: "Update Failed", text: e.message });
        }
    }
    
    function attachTableHandlers() {
        $('.edit-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const record = allAssets.find(a => a.id === id && a.branch === branchFromCache);
            if(record) {
                $("#editRowId").val(record.id);
                $("#editId").val(record.id);
                $("#editDistrict").val(record.district);
                $("#editTreasury").val(record.treasury);
                $("#editBranch").val(record.branch);
                $("#editAssetId").val(record.assetId);
                $("#editIp").val(record.ipAssigned);
                $("#editWorkingStatus").val(record.workingStatus);
                new bootstrap.Modal(document.getElementById('editAssetModal')).show();
            }
        });
        $('.delete-asset').off('click').on('click', function() {
            const id = $(this).data('id');
            const assetId = $(this).data('assetid');
            Swal.fire({ title: 'Delete?', text: `Remove "${assetId}"?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#dc2626' })
                .then(res => { if(res.isConfirmed) deleteAsset(id); });
        });
    }
    
    async function loadAssetsAndRenderTable() {
        if(!branchFromCache) { if(dataTable) dataTable.clear().draw(); return; }
        showGlobalLoading("Loading...");
        allAssets = await fetchAllAssets();
        const filtered = allAssets.filter(a => a.branch === branchFromCache);
        if(dataTable) {
            dataTable.clear();
            dataTable.rows.add(filtered);
            dataTable.draw();
        } else {
            $('#assetTable tbody').empty();
            dataTable = $('#assetTable').DataTable({
                data: filtered,
                columns: [
                    { data: "id" }, { data: "district" }, { data: "treasury" }, { data: "branch" },
                    { data: "assetId" }, { data: "ipAssigned" },
                    { data: "workingStatus", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: "confirm", render: d => d==="Yes"? '<span class="badge-success">Yes</span>':'<span class="badge-secondary">No</span>' },
                    { data: null, render: row => `<div class="action-icons">
                        <i class="bi bi-pencil-square edit-asset" data-id="${row.id}" style="cursor:pointer;"></i>
                        <i class="bi bi-trash3 delete-asset" data-id="${row.id}" data-assetid="${escapeHtml(row.assetId)}" style="cursor:pointer;"></i>
                    </div>` }
                ],
                order: [[0, 'desc']],
                pageLength: -1,
                drawCallback: function() { attachTableHandlers(); }
            });
        }
        attachTableHandlers();
        hideGlobalLoading();
    }
    
    function switchTab(tab) {
        if(tab === 'add') {
            $("#addPane").addClass("active-pane");
            $("#editPane").removeClass("active-pane");
            $("#tabAddBtn").addClass("active");
            $("#tabEditBtn").removeClass("active");
            refreshPcRows();
        } else {
            $("#editPane").addClass("active-pane");
            $("#addPane").removeClass("active-pane");
            $("#tabEditBtn").addClass("active");
            $("#tabAddBtn").removeClass("active");
            loadAssetsAndRenderTable();
        }
    }
    
    function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    $(async function() {
        showGlobalLoading("Initializing...");
        settingsMap = await fetchSettings();
        branchFromCache = getBranchFromStorage();
        updateBranchInfo();
        if(!branchFromCache) {
            Swal.fire({ icon: 'warning', title: 'Branch Not Detected', text: 'Please login again.' });
            $("#pcRowsContainer").html('<div class="alert alert-warning">Please login to add PC assets.</div>');
        } else {
            await loadAssetsAndRenderTable();
            refreshPcRows();
        }
        hideGlobalLoading();
        $("#addMorePcBtn").click(addNewTableRow);
        $("#submitAllPcBtn").click(async () => { const records = collectAllRowsData(); if(records) await submitBatchRecords(records); });
        $("#refreshTableBtn").click(() => loadAssetsAndRenderTable());
        $("#tabAddBtn").click(() => switchTab('add'));
        $("#tabEditBtn").click(() => switchTab('edit'));
        $("#confirmAssetUpdateBtn").click(updateAssetHandler);
        if(branchFromCache) addNewTableRow();
    });
</script>
</body>
