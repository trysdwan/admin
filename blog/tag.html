<!-- tag.html - Tag Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <meta property="og:title" content="Tag | NOC Blog">
    <meta property="og:description" content="Browse articles by tag on NOC Blog">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="NOC Blog">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tag | NOC Blog">
    <meta name="twitter:description" content="Browse articles by tag on NOC Blog">
    
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/blog.css">
    <style>
        .tag-header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        .tag-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .tag-header .tag-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .post-count-badge {
            background: rgba(255,255,255,0.2);
            border-radius: 9999px;
            padding: 0.25rem 1rem;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 0.5rem;
        }
        .no-results-tag {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 1.5rem;
        }
        .tag-badge-link {
            background: #eef2ff;
            color: #4f46e5;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }
        .tag-badge-link:hover {
            background: #4f46e5;
            color: white;
            transform: translateY(-2px);
        }
        /* Loading animation */
        .skeleton-loader {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.75rem;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

<header id="main-header"></header>

<main>
    <div class="tag-header text-center">
        <div class="container">
            <div class="tag-icon">
                <i class="bi bi-tag-fill"></i>
            </div>
            <h1 id="tagName">Loading...</h1>
            <div class="post-count-badge" id="postCount">0 posts</div>
        </div>
    </div>
    
    <div class="container">
        <div id="postsContainer" class="row g-4">
            <div class="text-center p-5" id="loadingSpinner">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading posts...</p>
            </div>
        </div>
    </div>
</main>

<footer class="py-4 mt-5">
    <div class="container text-center text-muted small">
        <i class="bi bi-c-circle"></i> NOC / blog 
    </div>
</footer>

<div id="liveToast" class="toast-custom"><i class="bi bi-check-lg me-2"></i><span id="toastMsg"></span></div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script>
// ======================== UTILITY FUNCTIONS ========================
function showToastMessage(msg, isError = false) {
    const toastEl = document.getElementById('liveToast');
    const span = document.getElementById('toastMsg');
    if (!toastEl || !span) return;
    span.innerText = msg;
    toastEl.style.background = isError ? '#d32f2f' : '#1f1f1f';
    toastEl.style.opacity = '1';
    setTimeout(() => { toastEl.style.opacity = '0'; }, 2500);
}

function extractFirstImage(html) {
    if (!html) return null;
    const match = html.match(/<img[^>]+src=["']([^"']+)["']/i);
    return match ? match[1] : null;
}

function stripHtml(html) {
    let temp = document.createElement("div");
    temp.innerHTML = html;
    return temp.textContent || temp.innerText || "";
}

function createSlug(title) {
    return title.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').trim();
}

function escapeHtml(str) { 
    if(!str) return ''; 
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); 
}

// Check if running locally (file:// protocol)
function isLocalFileProtocol() {
    return window.location.protocol === 'file:';
}

// Navigate to post using ID (works in both local and server environments)
function navigateToPost(postId) {
    // Always use query parameter format for reliable navigation
    window.location.href = `post.html?id=${postId}`;
}

function navigateToCategory(category) {
    window.location.href = `category.html?category=${encodeURIComponent(category)}`;
}

function navigateToTag(tag) {
    window.location.href = `tag.html?tag=${encodeURIComponent(tag)}`;
}

function navigateToAuthor(authorName, authorDesignation) {
    let url = `profile.html?author=${encodeURIComponent(authorName)}`;
    if (authorDesignation && authorDesignation.trim()) {
        url += `&designation=${encodeURIComponent(authorDesignation)}`;
    }
    window.location.href = url;
}

async function loadHeaderConfig() {
    try {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/configure!A:F?key=${CONFIG.API_KEY}`;
        const resp = await fetch(url);
        const data = await resp.json();
        const rows = data.values || [];
        let blogTitle = "Blog Studio", logoUrl = "";
        let menuItems = [];
        for(let i=1; i<rows.length; i++) {
            let row = rows[i];
            let item = row[0]?.trim(), configVal = row[1]?.trim(), menu = row[2]?.trim(), sub = row[3]?.trim(), linkItem = row[4]?.trim(), link = row[5]?.trim();
            if(item === "Blog Title" && configVal) blogTitle = configVal;
            if(item === "Blog logo(url)" && configVal) logoUrl = configVal;
            if(menu && menu !== "Menu") {
                let existing = menuItems.find(m => m.name === menu);
                if(!existing) {
                    existing = { name: menu, subItems: [] };
                    menuItems.push(existing);
                }
                if(sub && sub !== "Sub Menu" && linkItem && link) {
                    existing.subItems.push({ label: sub, url: link });
                } else if (linkItem && link && (!sub || sub === "Sub Menu")) {
                    existing.subItems.push({ label: linkItem, url: link });
                }
            }
        }
        renderHeader(blogTitle, logoUrl, menuItems);
    } catch(e) { 
        console.error('Header loading error:', e);
        renderHeader("Blog Studio", "", []); 
    }
}

function renderHeader(title, logoUrl, menus) {
    let logoHtml = logoUrl ? `<img src="${logoUrl}" height="35" alt="logo">` : `<i class="bi bi-journal-bookmark-fill fs-3" style="color:#1a73e8"></i>`;
    let navHtml = `<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top px-3 px-md-5 py-2 shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="./index.html">${logoHtml} ${title}</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#blogNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="blogNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-2">`;
    menus.forEach(menu => {
        if(menu.subItems.length) {
            navHtml += `<li class="nav-item dropdown"><a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">${menu.name}</a><ul class="dropdown-menu">`;
            menu.subItems.forEach(sub => { navHtml += `<li><a class="dropdown-item" href="${sub.url}">${sub.label}</a></li>`; });
            navHtml += `</ul></li>`;
        } else {
            navHtml += `<li class="nav-item"><a class="nav-link" href="#">${menu.name}</a></li>`;
        }
    });
    navHtml += `</ul></div></div></nav>`;
    document.getElementById('main-header').innerHTML = navHtml;
}

// Parse tags from content
function parseTagsFromContent(content) {
    if (!content) return [];
    const hashtagMatches = content.match(/#[\w\u0590-\u05fe]+/g);
    if (hashtagMatches) {
        return [...new Set(hashtagMatches.map(t => t.substring(1)))];
    }
    return [];
}

async function fetchAllPosts() {
    const blogUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/blog%20data!A:I?key=${CONFIG.API_KEY}`;
    const response = await fetch(blogUrl);
    const data = await response.json();
    const rows = data.values || [];
    if(rows.length < 2) return [];
    
    const posts = [];
    for(let i=1; i<rows.length; i++) {
        let row = rows[i];
        if(row[0]) {
            posts.push({
                id: row[0],
                category: row[1] || "General",
                tags: row[2] || "",
                author: row[3] || "Anonymous",
                publishedTime: row[4] || "",
                title: row[5] || "Untitled",
                content: row[6] || "",
                likeCount: parseInt(row[7]) || 0,
                shareCount: parseInt(row[8]) || 0,
                image: extractFirstImage(row[6] || "")
            });
        }
    }
    return posts;
}

function getPostsByTag(posts, tag) {
    return posts.filter(post => {
        // Check tags field
        if (post.tags && post.tags.toLowerCase().includes(tag.toLowerCase())) {
            return true;
        }
        // Check hashtags in content
        const hashtags = parseTagsFromContent(post.content);
        return hashtags.some(t => t.toLowerCase() === tag.toLowerCase());
    });
}

async function initTagPage() {
    await loadHeaderConfig();
    
    const urlParams = new URLSearchParams(window.location.search);
    const tag = urlParams.get('tag');
    
    if (!tag) {
        document.getElementById("loadingSpinner").innerHTML = `
            <div class="error-box alert alert-danger">
                <i class="bi bi-exclamation-triangle-fill"></i><br>
                <strong>No tag specified!</strong><br>
                Please use a valid tag URL like:<br>
                <code>tag.html?tag=technology</code>
            </div>`;
        return;
    }
    
    // Decode the tag from URL
    const decodedTag = decodeURIComponent(tag);
    document.getElementById("tagName").innerHTML = `<i class="bi bi-hash"></i> ${escapeHtml(decodedTag)}`;
    document.title = `#${decodedTag} | NOC Blog`;
    
    try {
        const allPosts = await fetchAllPosts();
        const taggedPosts = getPostsByTag(allPosts, decodedTag);
        
        const postsContainer = document.getElementById("postsContainer");
        const loadingSpinner = document.getElementById("loadingSpinner");
        
        document.getElementById("postCount").innerHTML = `${taggedPosts.length} post${taggedPosts.length !== 1 ? 's' : ''}`;
        
        if (taggedPosts.length === 0) {
            loadingSpinner.style.display = "none";
            postsContainer.innerHTML = `
                <div class="col-12">
                    <div class="no-results-tag">
                        <i class="bi bi-tag fs-1 text-muted"></i>
                        <h3 class="mt-3">No posts found with tag "#${escapeHtml(decodedTag)}"</h3>
                        <p class="text-muted">Try searching for a different tag or check out all articles.</p>
                        <a href="./index.html" class="btn btn-primary rounded-pill px-4 mt-3">
                            <i class="bi bi-house"></i> Back to Home
                        </a>
                    </div>
                </div>
            `;
            return;
        }
        
        loadingSpinner.style.display = "none";
        
        postsContainer.innerHTML = taggedPosts.map(post => `
            <div class="col-md-6 col-lg-4">
                <div class="card-blog h-100" data-post-id="${post.id}">
                    <img src="${post.image}" class="card-img-top" 
                         alt="${escapeHtml(post.title)}"
                         onerror="this.src='https://placehold.co/600x400/e2e8f0/64748b?text=No+Image'"
                         loading="lazy">
                    <div class="card-body">
                        <span class="category-badge mb-2" data-category="${escapeHtml(post.category)}">${escapeHtml(post.category)}</span>
                        <h5 class="card-title">${escapeHtml(post.title)}</h5>
                        <p class="card-text text-truncate-2">${escapeHtml(stripHtml(post.content).substring(0, 120))}...</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="small text-muted">
                                <i class="bi bi-person-circle"></i> ${escapeHtml(post.author)}<br>
                                <i class="bi bi-calendar3"></i> ${escapeHtml(post.publishedTime)}
                            </div>
                            <button class="btn btn-sm btn-outline-primary rounded-pill read-more-btn" data-id="${post.id}" data-title="${escapeHtml(post.title)}">
                                Read <i class="bi bi-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        
        // Add click handlers for cards (navigate to post)
        document.querySelectorAll('.card-blog').forEach(card => {
            card.addEventListener('click', (e) => {
                // Don't navigate if clicking on category badge or read more button
                if (!e.target.classList.contains('read-more-btn') && 
                    !e.target.closest('.read-more-btn') &&
                    !e.target.classList.contains('category-badge') &&
                    !e.target.closest('.category-badge')) {
                    const postId = card.getAttribute('data-post-id');
                    if (postId) {
                        navigateToPost(postId);
                    }
                }
            });
        });
        
        // Add click handlers for read more buttons
        document.querySelectorAll('.read-more-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const postId = btn.getAttribute('data-id');
                if (postId) {
                    navigateToPost(postId);
                }
            });
        });
        
        // Add click handlers for category badges
        document.querySelectorAll('.category-badge').forEach(badge => {
            badge.addEventListener('click', (e) => {
                e.stopPropagation();
                const category = badge.getAttribute('data-category');
                if (category) {
                    navigateToCategory(category);
                }
            });
        });
        
    } catch(err) {
        console.error('Error:', err);
        document.getElementById("loadingSpinner").innerHTML = `
            <div class="error-box alert alert-danger">
                <strong>Error loading posts:</strong><br>
                ${err.message}<br>
                <a href="./index.html">← Back to Home</a>
            </div>`;
    }
}

// Initialize the page when DOM is ready
document.addEventListener('DOMContentLoaded', initTagPage);
</script>
</body>
</html>
