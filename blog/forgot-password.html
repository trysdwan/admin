<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Forgot Password - Blog Studio</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-bg: #f8fafc;
            --card-border: #e2e8f0;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
        }
        .reset-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .reset-card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid var(--card-border);
        }
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .reset-header i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .reset-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0.5rem;
            color: #1e293b;
        }
        .reset-header p {
            color: #64748b;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--card-border);
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        .input-group-text {
            background: transparent;
            border-right: none;
            border-radius: 0.75rem 0 0 0.75rem;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 0.75rem 0.75rem 0;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            border: none;
            border-radius: 0.75rem;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }
        .btn-primary-custom:disabled {
            opacity: 0.7;
            transform: none;
        }
        .btn-outline-custom {
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            padding: 0.85rem;
            font-weight: 500;
            font-size: 0.9rem;
            width: 100%;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .btn-outline-custom:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .otp-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
            border: 1px solid var(--card-border);
        }
        .otp-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }
        .password-requirements {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 0.5rem;
        }
        .password-requirements .valid {
            color: var(--success);
        }
        .password-requirements .invalid {
            color: var(--danger);
        }
        .toast-custom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1f1f1f;
            color: white;
            padding: 12px 24px;
            border-radius: 48px;
            z-index: 1090;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
        }
        .spinner-overlay.active {
            visibility: visible;
        }
        .spinner-box {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .resend-timer {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .reset-card { padding: 1.5rem; }
            .otp-input { width: 40px; height: 50px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <i class="bi bi-key-fill"></i>
                <h2>Reset Password</h2>
                <p>We'll help you reset your password</p>
            </div>

            <!-- Step 1: Request OTP -->
            <div id="step1" class="step active">
                <form id="requestOtpForm">
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="resetEmail" placeholder="Enter your registered email" required>
                        </div>
                        <div class="form-text">We'll send a 6-digit OTP to this email</div>
                    </div>
                    <button type="submit" class="btn-primary-custom">
                        <i class="bi bi-send"></i> Send OTP
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="login.html" class="text-decoration-none small">← Back to Login</a>
                </div>
            </div>

            <!-- Step 2: Verify OTP -->
            <div id="step2" class="step">
                <form id="verifyOtpForm">
                    <div class="mb-3">
                        <label class="form-label">Enter OTP</label>
                        <div class="otp-input-group" id="otpContainer">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp1">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp2">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp3">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp4">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp5">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp6">
                        </div>
                        <input type="hidden" id="hiddenEmail" value="">
                    </div>
                    <button type="submit" class="btn-primary-custom mb-2">
                        <i class="bi bi-check-circle"></i> Verify OTP
                    </button>
                    <button type="button" class="btn-outline-custom" id="resendOtpBtn">
                        <i class="bi bi-arrow-repeat"></i> Resend OTP
                    </button>
                    <div class="resend-timer text-center" id="resendTimer"></div>
                </form>
                <div class="text-center mt-3">
                    <a href="#" onclick="goToStep1()" class="text-decoration-none small">← Back</a>
                </div>
            </div>

            <!-- Step 3: Set New Password -->
            <div id="step3" class="step">
                <form id="resetPasswordForm">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="newPassword" placeholder="Enter new password" required>
                        </div>
                        <div class="password-requirements" id="passwordRequirements">
                            <small><i class="bi bi-shield-check"></i> Password must have:</small>
                            <div><i class="bi bi-dot" id="lengthReq"></i> At least 6 characters</div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirm New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password" required>
                        </div>
                        <div class="form-text" id="passwordMatchMsg"></div>
                    </div>
                    <button type="submit" class="btn-primary-custom">
                        <i class="bi bi-check-lg"></i> Reset Password
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="login.html" class="text-decoration-none small">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="spinnerOverlay" class="spinner-overlay">
        <div class="spinner-box">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 mb-0">Processing...</p>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="liveToast" class="toast-custom"><i class="bi bi-check-lg me-2"></i><span id="toastMsg"></span></div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script>
        let currentEmail = '';
        let resendTimer = null;
        let timerSeconds = 60;

        function showToastMessage(msg, isError = false) {
            const toastEl = document.getElementById('liveToast');
            const span = document.getElementById('toastMsg');
            span.innerText = msg;
            toastEl.style.background = isError ? '#dc2626' : '#1f1f1f';
            toastEl.style.opacity = '1';
            setTimeout(() => { toastEl.style.opacity = '0'; }, 3000);
        }

        function setLoading(loading) {
            const spinner = document.getElementById('spinnerOverlay');
            loading ? spinner.classList.add('active') : spinner.classList.remove('active');
        }

        function goToStep1() {
            document.getElementById('step1').classList.add('active');
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.remove('active');
            // Clear OTP inputs
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`otp${i}`).value = '';
            }
        }

        // OTP input auto-tab
        function setupOtpInputs() {
            for (let i = 1; i <= 6; i++) {
                const input = document.getElementById(`otp${i}`);
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && i < 6) {
                        document.getElementById(`otp${i+1}`).focus();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && i > 1) {
                        document.getElementById(`otp${i-1}`).focus();
                    }
                });
            }
        }

        function getOtpValue() {
            let otp = '';
            for (let i = 1; i <= 6; i++) {
                otp += document.getElementById(`otp${i}`).value;
            }
            return otp;
        }

        // Password validation
        function validatePassword() {
            const password = document.getElementById('newPassword').value;
            const lengthReq = document.getElementById('lengthReq');
            
            if (password.length >= 6) {
                lengthReq.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> At least 6 characters';
                return true;
            } else {
                lengthReq.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i> At least 6 characters';
                return false;
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            const msgDiv = document.getElementById('passwordMatchMsg');
            
            if (confirm === '') {
                msgDiv.innerHTML = '';
                return false;
            }
            
            if (password === confirm) {
                msgDiv.innerHTML = '<i class="bi bi-check-circle-fill text-success"></i> Passwords match';
                return true;
            } else {
                msgDiv.innerHTML = '<i class="bi bi-x-circle-fill text-danger"></i> Passwords do not match';
                return false;
            }
        }

        document.getElementById('newPassword').addEventListener('input', () => {
            validatePassword();
            checkPasswordMatch();
        });
        document.getElementById('confirmNewPassword').addEventListener('input', checkPasswordMatch);

        // Start resend timer
        function startResendTimer() {
            timerSeconds = 60;
            const timerDiv = document.getElementById('resendTimer');
            const resendBtn = document.getElementById('resendOtpBtn');
            resendBtn.disabled = true;
            
            resendTimer = setInterval(() => {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    clearInterval(resendTimer);
                    timerDiv.innerHTML = '';
                    resendBtn.disabled = false;
                } else {
                    timerDiv.innerHTML = `Resend available in ${timerSeconds} seconds`;
                }
            }, 1000);
        }

        // Request OTP
        document.getElementById('requestOtpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                showToastMessage('Please enter your email', true);
                return;
            }
            
            setLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'requestPasswordReset');
                formData.append('email', email);
                
                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    currentEmail = email;
                    document.getElementById('hiddenEmail').value = email;
                    showToastMessage('OTP sent to your email!');
                    
                    // Move to step 2
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    startResendTimer();
                    
                    // Focus on first OTP input
                    document.getElementById('otp1').focus();
                } else {
                    throw new Error(result.error);
                }
            } catch(error) {
                showToastMessage(error.message || 'Failed to send OTP', true);
            }
            
            setLoading(false);
        });

        // Resend OTP
        document.getElementById('resendOtpBtn').addEventListener('click', async () => {
            if (timerSeconds > 0) {
                showToastMessage(`Please wait ${timerSeconds} seconds`, true);
                return;
            }
            
            setLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'requestPasswordReset');
                formData.append('email', currentEmail);
                
                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showToastMessage('New OTP sent!');
                    startResendTimer();
                    
                    // Clear OTP inputs
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`otp${i}`).value = '';
                    }
                    document.getElementById('otp1').focus();
                } else {
                    throw new Error(result.error);
                }
            } catch(error) {
                showToastMessage(error.message || 'Failed to resend OTP', true);
            }
            
            setLoading(false);
        });

        // Verify OTP
        document.getElementById('verifyOtpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = getOtpValue();
            const email = document.getElementById('hiddenEmail').value;
            
            if (otp.length !== 6) {
                showToastMessage('Please enter complete 6-digit OTP', true);
                return;
            }
            
            setLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'verifyResetOtp');
                formData.append('email', email);
                formData.append('otp', otp);
                
                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showToastMessage('OTP verified! Create new password.');
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                    
                    // Clear timer
                    if (resendTimer) {
                        clearInterval(resendTimer);
                    }
                } else {
                    throw new Error(result.error);
                }
            } catch(error) {
                showToastMessage(error.message || 'Invalid OTP', true);
            }
            
            setLoading(false);
        });

        // Reset Password
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            const email = document.getElementById('hiddenEmail').value;
            
            if (!validatePassword()) {
                showToastMessage('Password must be at least 6 characters', true);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToastMessage('Passwords do not match', true);
                return;
            }
            
            setLoading(true);
            
            try {
                const formData = new FormData();
                formData.append('action', 'resetPassword');
                formData.append('email', email);
                formData.append('newPassword', newPassword);
                
                const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    showToastMessage('Password reset successful! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    throw new Error(result.error);
                }
            } catch(error) {
                showToastMessage(error.message || 'Failed to reset password', true);
            }
            
            setLoading(false);
        });

        // Initialize OTP inputs
        setupOtpInputs();
    </script>
</body>
</html>
