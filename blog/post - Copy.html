<!-- post.html - Updated with URL Parameter Support for Category and Author -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
         <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Custom Blog CSS -->
    <link rel="stylesheet" href="css/blog.css">
    <style>
        /* Additional style for author image */
        .author-avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .author-avatar-img:hover {
            transform: scale(1.05);
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1a73e8;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .avatar:hover {
            transform: scale(1.05);
        }
        .category-link {
            cursor: pointer;
            color: #1a73e8;
            text-decoration: none;
        }
        .category-link:hover {
            text-decoration: underline;
        }
        .author-link {
            cursor: pointer;
        }
        .author-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header id="main-header"></header>

<main>
    <div class="blog-header" id="postHeader">
        <div class="text-center p-5" id="loadingSpinner">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2"></p>
        </div>
        <div id="postContentWrapper" style="display: none;"></div>
    </div>
</main>

<footer class="py-4 mt-5">
    <div class="container text-center text-muted small">
        <i class="bi bi-c-circle"></i> NOC / blog 

    </div>
</footer>

<div id="liveToast" class="toast-custom"><i class="bi bi-check-lg me-2"></i><span id="toastMsg"></span></div>

<script src="js/bootstrap.bundle.min.js"></script>
<script src="config.js"></script>
<script src="js/post.js"></script>
</body>
</html>
