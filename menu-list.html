<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Menu Manager | Treasury Admin Panel</title>
    
    <!-- CSS Resources (Bootstrap, Icons, DataTables, Select2, Flatpickr, SweetAlert2) -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="./css/select2.min.css">
    <link rel="stylesheet" href="./css/select2-bootstrap-5-theme.min.css">
    <link rel="stylesheet" href="./css/flatpickr.min.css">
    <link rel="stylesheet" href="./css/sweetalert2.min.css">
    
    <style>
        * { box-sizing: border-box; }
        body {
            background: #eef2f7;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 30px 20px;
        }
        .app-card {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 24px;
        }
        .tab-btn {
            padding: 16px 28px;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            border: none;
            color: #475569;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }
        .tab-btn i { margin-right: 8px; font-size: 1.1rem; }
        .tab-btn.active {
            color: #1e4a76;
            border-bottom-color: #1e4a76;
            background: white;
        }
        .tab-pane {
            display: none;
            padding: 30px 32px;
            background: white;
        }
        .tab-pane.active-pane {
            display: block;
        }
        .form-label {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .required:after {
            content: "*";
            color: #dc2626;
            margin-left: 4px;
        }
        .btn-primary-custom {
            background: #0f3b5f;
            border: none;
            padding: 10px 24px;
            font-weight: 600;
            border-radius: 40px;
            transition: 0.2s;
            color: white;
        }
        .btn-primary-custom:hover:not(:disabled) {
            background: #0a2c46;
            transform: translateY(-1px);
        }
        .btn-primary-custom:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .action-icons i {
            font-size: 1.2rem;
            margin: 0 5px;
            cursor: pointer;
            transition: 0.1s;
        }
        .action-icons i.bi-pencil-square { color: #3b82f6; }
        .action-icons i.bi-trash3 { color: #dc2626; }
        .action-icons i:hover { opacity: 0.7; transform: scale(1.05);}
        .select2-container--bootstrap-5 .select2-selection {
            border-radius: 12px !important;
            border: 1px solid #cbd5e1 !important;
            min-height: 42px;
        }
        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 8px 12px;
        }
        footer { font-size: 12px; text-align: center; margin-top: 20px; color: #5b6e8c; }
        .modal-content { border-radius: 24px; }
        @media (max-width: 700px) {
            .tab-pane { padding: 20px; }
            .tab-btn { padding: 12px 16px; font-size: 0.9rem; }
        }
        .btn-loading {
            pointer-events: none;
            opacity: 0.7;
        }
        .btn-loading i.bi-arrow-repeat {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #global-loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(3px);
        }
        .custom-option-toggle {
            margin-top: 8px;
        }
        .inline-text-input {
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="app-card">
    <div class="tab-header">
        <button class="tab-btn active" id="tabAddBtn"><i class="bi bi-plus-circle"></i> Add Menu Item</button>
        <button class="tab-btn" id="tabEditBtn"><i class="bi bi-table"></i> Edit / Manage Menus</button>
    </div>
    
    <!-- Tab 1: Add New Menu -->
    <div id="addPane" class="tab-pane active-pane">
        <h4 class="mb-3"><i class="bi bi-menu-app"></i> Register New Menu Item</h4>
        <div class="row g-4">
            <div class="col-md-6">
                <label class="form-label required">Main menu</label>
                <select id="mainMenuSelect" class="form-select main-menu-select" style="width:100%"></select>
                <div class="form-text">Select existing or type to search. Use "Other" to enter custom.</div>
                <input type="text" id="mainMenuCustom" class="form-control mt-2" placeholder="Or enter custom Main menu" style="display:none;">
                <button type="button" id="toggleMainCustom" class="btn btn-sm btn-link p-0 mt-1">+ Add custom main menu</button>
            </div>
            <div class="col-md-6">
                <label class="form-label required">Sub Menu</label>
                <select id="subMenuSelect" class="form-select sub-menu-select" style="width:100%"></select>
                <input type="text" id="subMenuCustom" class="form-control mt-2" placeholder="Or enter custom Sub menu" style="display:none;">
                <button type="button" id="toggleSubCustom" class="btn btn-sm btn-link p-0 mt-1">+ Add custom sub menu</button>
            </div>
            <div class="col-md-6">
                <label class="form-label required">link item</label>
                <input type="text" id="linkItem" class="form-control" placeholder="e.g., Dashboard, Add Power Status">
            </div>
            <div class="col-md-6">
                <label class="form-label required">Url</label>
                <input type="text" id="urlValue" class="form-control" placeholder="./path/to/page.html or https://...">
            </div>
            <div class="col-md-6">
                <label class="form-label required">Admin-Menu</label>
                <select id="adminMenuFlag" class="form-select">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label required">BR-Menu</label>
                <select id="brMenuFlag" class="form-select">
                     <option value="No">No</option>
                    <option value="Yes">Yes</option>
                   
                </select>
            </div>
            <div class="col-12 mt-3">
                <button id="submitMenuBtn" class="btn btn-primary-custom px-5"><i class="bi bi-save"></i> Submit Menu</button>
            </div>
        </div>
    </div>

    <!-- Tab 2: DataTable with Edit/Delete -->
    <div id="editPane" class="tab-pane">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h4><i class="bi bi-list-ul"></i> All Menu Items</h4>
            <button id="refreshTableBtn" class="btn btn-outline-secondary"><i class="bi bi-arrow-repeat"></i> Refresh</button>
        </div>
        <div class="table-responsive">
            <table id="menuTable" class="table table-striped table-hover" style="width:100%">
                <thead>
                    <tr>
                        <th>Main menu</th><th>Sub Menu</th><th>link item</th><th>Url</th><th>Admin-Menu</th><th>BR-Menu</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editMenuModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Menu Item</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editOriginalKey" value="">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Main menu</label>
                        <select id="editMainMenuSelect" class="form-select"></select>
                        <input type="text" id="editMainMenuCustom" class="form-control mt-2" placeholder="Custom main menu" style="display:none;">
                        <button type="button" id="editToggleMainCustom" class="btn btn-sm btn-link p-0 mt-1">+ Custom</button>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Sub Menu</label>
                        <select id="editSubMenuSelect" class="form-select"></select>
                        <input type="text" id="editSubMenuCustom" class="form-control mt-2" placeholder="Custom sub menu" style="display:none;">
                        <button type="button" id="editToggleSubCustom" class="btn btn-sm btn-link p-0 mt-1">+ Custom</button>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">link item</label>
                        <input type="text" id="editLinkItem" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Url</label>
                        <input type="text" id="editUrl" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Admin-Menu</label>
                        <select id="editAdminFlag" class="form-select"><option>Yes</option><option>No</option></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">BR-Menu</label>
                        <select id="editBrFlag" class="form-select"><option>Yes</option><option>No</option></select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button id="confirmUpdateBtn" class="btn btn-primary">Update Menu</button>
            </div>
        </div>
    </div>
</div>

<script src="./js/jquery.min.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>
<script src="./js/jquery.dataTables.min.js"></script>
<script src="./js/dataTables.bootstrap5.min.js"></script>
<script src="./js/select2.min.js"></script>
<script src="./js/sweetalert2.all.min.js"></script>

<script>
    // ================= CONFIGURATION =================
    const SPREADSHEET_ID = "1jd1xZe9x2mrZm5KAwGT12vMNYjbrnynsmelNKeK95jc";
    const SHEET_NAME = "All Menu";
    const API_KEY = "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM";
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfUbpikQ_UPXc9B0z2xgz3MeQ6jxPUy_ssMFYsQ4biAq2CbVtxKq1NQUeQyakDf-nhWg/exec"; // Replace with your actual Web App URL
    
    let allMenuData = [];        // stores full menu objects
 let dataTable = null;
 let mainMenuOptions = [];
 let subMenuOptions = [];
 
 // Helper functions
 function showGlobalLoading(msg = 'Processing...') {
     if($('#global-loading-overlay').length) return;
     $('body').append(`<div id="global-loading-overlay"><div style="background:white;padding:30px;border-radius:24px;text-align:center;"><i class="bi bi-arrow-repeat bi-spinner" style="font-size:48px;color:#0f3b5f;"></i><p style="margin-top:15px;">${msg}</p></div></div>`);
 }
 function hideGlobalLoading() { $('#global-loading-overlay').remove(); }
 
 function setButtonLoading(btn, isLoading, originalHtml) {
     const $btn = $(btn);
     if(isLoading) {
         $btn.data('original-html', $btn.html());
         $btn.html('<i class="bi bi-arrow-repeat"></i> Processing...');
         $btn.prop('disabled', true).addClass('btn-loading');
     } else {
         $btn.html($btn.data('original-html') || originalHtml);
         $btn.prop('disabled', false).removeClass('btn-loading');
     }
 }
 
 // Fetch distinct values from sheet columns for dropdowns
 async function fetchDistinctMenuOptions() {
     try {
         const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:F?key=${API_KEY}`;
         const resp = await fetch(url);
         const data = await resp.json();
         const rows = data.values || [];
         const mainSet = new Set();
         const subSet = new Set();
         rows.forEach(row => {
             if(row[0]) mainSet.add(row[0].trim());
             if(row[1]) subSet.add(row[1].trim());
         });
         mainMenuOptions = Array.from(mainSet).sort();
         subMenuOptions = Array.from(subSet).sort();
         populateSelectors();
     } catch(e) { console.warn("fetch options error", e); }
 }
 
 function populateSelectors() {
     // Add Tab selects
     const $mainSel = $("#mainMenuSelect");
     $mainSel.empty().append('<option></option>');
     mainMenuOptions.forEach(opt => $mainSel.append(`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`));
     $mainSel.select2({ theme: 'bootstrap-5', placeholder: "Select Main menu", allowClear: true, width: '100%' });
     
     const $subSel = $("#subMenuSelect");
     $subSel.empty().append('<option></option>');
     subMenuOptions.forEach(opt => $subSel.append(`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`));
     $subSel.select2({ theme: 'bootstrap-5', placeholder: "Select Sub Menu", allowClear: true, width: '100%' });
     
     // Edit modal selects
     const $editMain = $("#editMainMenuSelect");
     $editMain.empty().append('<option></option>');
     mainMenuOptions.forEach(opt => $editMain.append(`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`));
     
     const $editSub = $("#editSubMenuSelect");
     $editSub.empty().append('<option></option>');
     subMenuOptions.forEach(opt => $editSub.append(`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`));
 }
 
 function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
 
 // Fetch full menu data from sheet A2:F
 async function loadAllMenuData() {
     showGlobalLoading('Loading menu data...');
     const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A2:F?key=${API_KEY}`;
     try {
         const resp = await fetch(url);
         const data = await resp.json();
         const rows = data.values || [];
         allMenuData = rows.map(row => ({
             mainMenu: (row[0] || "").trim(),
             subMenu: (row[1] || "").trim(),
             linkItem: (row[2] || "").trim(),
             url: (row[3] || "").trim(),
             adminMenu: (row[4] || "").trim() === "Yes" ? "Yes" : "No",
             brMenu: (row[5] || "").trim() === "Yes" ? "Yes" : "No"
         }));
         renderDataTable();
         hideGlobalLoading();
         return allMenuData;
     } catch(err) {
         console.error(err);
         hideGlobalLoading();
         Swal.fire({ icon: 'error', title: 'Load Failed', text: 'Cannot fetch menu data from Google Sheet' });
         return [];
     }
 }
 
 function renderDataTable() {
     if(dataTable) {
         dataTable.destroy();
         $('#menuTable tbody').empty();
     }
     dataTable = $('#menuTable').DataTable({
         data: allMenuData,
         columns: [
             { data: "mainMenu" },
             { data: "subMenu" },
             { data: "linkItem" },
             { data: "url", render: (d) => d ? `<span title="${escapeHtml(d)}">${escapeHtml(d.length>50?d.substring(0,50)+'...':d)}</span>` : '' },
             { data: "adminMenu", render: (d) => d === "Yes" ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>' },
             { data: "brMenu", render: (d) => d === "Yes" ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>' },
             { data: null, orderable: false, render: (row) => {
                 const uniqueKey = btoa(unescape(encodeURIComponent(row.mainMenu + '|' + row.subMenu + '|' + row.linkItem))); // safe key
                 return `<div class="action-icons"><i class="bi bi-pencil-square edit-row" data-key="${uniqueKey}" data-main="${escapeHtml(row.mainMenu)}" data-sub="${escapeHtml(row.subMenu)}" data-link="${escapeHtml(row.linkItem)}" data-url="${escapeHtml(row.url)}" data-admin="${row.adminMenu}" data-br="${row.brMenu}"></i><i class="bi bi-trash3 delete-row" data-key="${uniqueKey}" data-main="${escapeHtml(row.mainMenu)}" data-sub="${escapeHtml(row.subMenu)}" data-link="${escapeHtml(row.linkItem)}"></i></div>`;
             } }
         ],
         order: [[0, 'asc'], [1, 'asc']],
         pageLength: -1,
         language: { search: "Filter:" }
     });
     attachTableEvents();
 }
 
 function attachTableEvents() {
     $('.edit-row').off('click').on('click', function() {
         const main = $(this).data('main');
         const sub = $(this).data('sub');
         const link = $(this).data('link');
         const url = $(this).data('url');
         const admin = $(this).data('admin');
         const br = $(this).data('br');
         openEditModal(main, sub, link, url, admin, br);
     });
     $('.delete-row').off('click').on('click', function() {
         const main = $(this).data('main');
         const sub = $(this).data('sub');
         const link = $(this).data('link');
         Swal.fire({
             title: 'Delete Menu Item?',
             text: `Are you sure you want to delete "${main} / ${sub} / ${link}"?`,
             icon: 'warning',
             showCancelButton: true,
             confirmButtonColor: '#dc2626',
             confirmButtonText: 'Yes, delete'
         }).then(result => {
             if(result.isConfirmed) deleteMenuItem(main, sub, link);
         });
     });
 }
 
 function getCurrentRowKey(main, sub, link) {
     return `${main}|||${sub}|||${link}`;
 }
 
 async function deleteMenuItem(mainMenu, subMenu, linkItem) {
     showGlobalLoading('Deleting record...');
     const payload = { action: "DELETE", mainMenu, subMenu, linkItem };
     try {
         await fetchWithTimeout(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
         hideGlobalLoading();
         Swal.fire({ icon: 'success', title: 'Deleted!', timer: 1500, showConfirmButton: false });
         await loadAllMenuData();
         await fetchDistinctMenuOptions(); // refresh dropdowns
     } catch(e) {
         hideGlobalLoading();
         Swal.fire({ icon: 'error', title: 'Delete Failed', text: e.message });
     }
 }
 
 async function fetchWithTimeout(url, options, timeout=15000) {
     const controller = new AbortController();
     const id = setTimeout(() => controller.abort(), timeout);
     const response = await fetch(url, { ...options, signal: controller.signal });
     clearTimeout(id);
     return response;
 }
 
 async function submitNewMenu() {
     // Get values: Main menu
     let mainMenu = $("#mainMenuSelect").val();
     const mainCustom = $("#mainMenuCustom").val();
     if(mainCustom && mainCustom.trim() !== "") mainMenu = mainCustom.trim();
     if(!mainMenu) { Swal.fire({ icon: 'warning', title: 'Missing', text: 'Main menu is required' }); return; }
     
     let subMenu = $("#subMenuSelect").val();
     const subCustom = $("#subMenuCustom").val();
     if(subCustom && subCustom.trim() !== "") subMenu = subCustom.trim();
     if(!subMenu) { Swal.fire({ icon: 'warning', title: 'Missing', text: 'Sub menu is required' }); return; }
     
     const linkItem = $("#linkItem").val().trim();
     if(!linkItem) { Swal.fire({ icon: 'warning', title: 'Missing', text: 'Link item is required' }); return; }
     const urlValue = $("#urlValue").val().trim();
     if(!urlValue) { Swal.fire({ icon: 'warning', title: 'Missing', text: 'URL is required' }); return; }
     const adminFlag = $("#adminMenuFlag").val();
     const brFlag = $("#brMenuFlag").val();
     
     // Check for duplicate (main+sub+link)
     const exists = allMenuData.some(item => item.mainMenu === mainMenu && item.subMenu === subMenu && item.linkItem === linkItem);
     if(exists) {
         Swal.fire({ icon: 'error', title: 'Duplicate', text: 'This menu item already exists!' });
         return;
     }
     
     const payload = { action: "ADD", mainMenu, subMenu, linkItem, url: urlValue, adminMenu: adminFlag, brMenu: brFlag };
     const $btn = $("#submitMenuBtn");
     const origHtml = $btn.html();
     setButtonLoading($btn, true, origHtml);
     try {
         await fetchWithTimeout(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
         Swal.fire({ icon: 'success', title: 'Added!', text: 'Menu item added successfully', timer: 1500, showConfirmButton: false });
         $("#linkItem").val('');
         $("#urlValue").val('');
         $("#adminMenuFlag").val('Yes');
         $("#brMenuFlag").val('Yes');
         $("#mainMenuCustom").val('').hide();
         $("#subMenuCustom").val('').hide();
         $("#mainMenuSelect").val(null).trigger('change');
         $("#subMenuSelect").val(null).trigger('change');
         await loadAllMenuData();
         await fetchDistinctMenuOptions();
     } catch(e) {
         Swal.fire({ icon: 'error', title: 'Error', text: e.message });
     } finally {
         setButtonLoading($btn, false, origHtml);
     }
 }
 
 function openEditModal(main, sub, link, url, admin, br) {
     $("#editOriginalKey").val(`${main}|${sub}|${link}`);
     $("#editLinkItem").val(link);
     $("#editUrl").val(url);
     $("#editAdminFlag").val(admin);
     $("#editBrFlag").val(br);
     
     // Populate selects and custom logic
     const $mainSel = $("#editMainMenuSelect");
     const $subSel = $("#editSubMenuSelect");
     $mainSel.val(main).trigger('change');
     $subSel.val(sub).trigger('change');
     $("#editMainMenuCustom").val('').hide();
     $("#editSubMenuCustom").val('').hide();
     
     const modal = new bootstrap.Modal(document.getElementById('editMenuModal'));
     modal.show();
 }
 
 async function updateMenuHandler() {
     const originalKey = $("#editOriginalKey").val();
     const [origMain, origSub, origLink] = originalKey.split('|');
     
     let newMain = $("#editMainMenuSelect").val();
     const mainCustom = $("#editMainMenuCustom").val();
     if(mainCustom && mainCustom.trim() !== "") newMain = mainCustom.trim();
     
     let newSub = $("#editSubMenuSelect").val();
     const subCustom = $("#editSubMenuCustom").val();
     if(subCustom && subCustom.trim() !== "") newSub = subCustom.trim();
     
     const newLink = $("#editLinkItem").val().trim();
     const newUrl = $("#editUrl").val().trim();
     const newAdmin = $("#editAdminFlag").val();
     const newBr = $("#editBrFlag").val();
     
     if(!newMain || !newSub || !newLink || !newUrl) {
         Swal.fire({ icon: 'warning', title: 'Missing fields', text: 'All fields required' });
         return;
     }
     
     // Check if changing combination would create duplicate (except current)
     const duplicateExists = allMenuData.some(item => 
         (item.mainMenu === newMain && item.subMenu === newSub && item.linkItem === newLink) &&
         !(item.mainMenu === origMain && item.subMenu === origSub && item.linkItem === origLink)
     );
     if(duplicateExists) {
         Swal.fire({ icon: 'error', title: 'Duplicate', text: 'Another menu item with same Main+Sub+Link exists' });
         return;
     }
     
     const payload = { 
         action: "UPDATE", 
         originalMain: origMain, originalSub: origSub, originalLink: origLink,
         mainMenu: newMain, subMenu: newSub, linkItem: newLink, url: newUrl, 
         adminMenu: newAdmin, brMenu: newBr 
     };
     
     const $btn = $("#confirmUpdateBtn");
     const origHtml = $btn.html();
     setButtonLoading($btn, true, origHtml);
     try {
         await fetchWithTimeout(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
         Swal.fire({ icon: 'success', title: 'Updated!', timer: 1500, showConfirmButton: false });
         bootstrap.Modal.getInstance(document.getElementById('editMenuModal')).hide();
         await loadAllMenuData();
         await fetchDistinctMenuOptions();
     } catch(e) {
         Swal.fire({ icon: 'error', title: 'Update Failed', text: e.message });
     } finally {
         setButtonLoading($btn, false, origHtml);
     }
 }
 
 // Custom toggle handlers
 function initCustomToggles() {
     $("#toggleMainCustom").on("click", function() {
         $("#mainMenuCustom").toggle();
         if($("#mainMenuCustom").is(":visible")) $("#mainMenuCustom").focus();
         else $("#mainMenuCustom").val('');
     });
     $("#toggleSubCustom").on("click", function() {
         $("#subMenuCustom").toggle();
         if($("#subMenuCustom").is(":visible")) $("#subMenuCustom").focus();
         else $("#subMenuCustom").val('');
     });
     $("#editToggleMainCustom").on("click", function() {
         $("#editMainMenuCustom").toggle();
         if($("#editMainMenuCustom").is(":visible")) $("#editMainMenuCustom").focus();
         else $("#editMainMenuCustom").val('');
     });
     $("#editToggleSubCustom").on("click", function() {
         $("#editSubMenuCustom").toggle();
         if($("#editSubMenuCustom").is(":visible")) $("#editSubMenuCustom").focus();
         else $("#editSubMenuCustom").val('');
     });
     // When select changes, optionally clear custom if it's selected
     $("#editMainMenuSelect").on("change", function() { if($(this).val()) $("#editMainMenuCustom").val('').hide(); });
     $("#editSubMenuSelect").on("change", function() { if($(this).val()) $("#editSubMenuCustom").val('').hide(); });
 }
 
 // Tab switching
 function switchTab(tab) {
     if(tab === 'add') {
         $("#addPane").addClass("active-pane");
         $("#editPane").removeClass("active-pane");
         $("#tabAddBtn").addClass("active");
         $("#tabEditBtn").removeClass("active");
     } else {
         $("#editPane").addClass("active-pane");
         $("#addPane").removeClass("active-pane");
         $("#tabEditBtn").addClass("active");
         $("#tabAddBtn").removeClass("active");
         if(dataTable) dataTable.columns.adjust().draw();
         else loadAllMenuData();
     }
 }
 
 // Initialization
 $(document).ready(async function() {
     await fetchDistinctMenuOptions();
     await loadAllMenuData();
     initCustomToggles();
     $("#submitMenuBtn").on("click", submitNewMenu);
     $("#confirmUpdateBtn").on("click", updateMenuHandler);
     $("#refreshTableBtn").on("click", async () => { await loadAllMenuData(); await fetchDistinctMenuOptions(); });
     $("#tabAddBtn").on("click", () => switchTab('add'));
     $("#tabEditBtn").on("click", () => switchTab('edit'));
     
     // fallback for custom selects styling
     $(".main-menu-select, .sub-menu-select").on("select2:select", function(e) {
         if($(this).attr('id') === 'mainMenuSelect') $("#mainMenuCustom").val('').hide();
         else $("#subMenuCustom").val('').hide();
     });
 });
