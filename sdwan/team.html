<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Team - Network Operations Center</title>
    
    <!-- LOCAL CSS - Using same resources as main app -->
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/dataTables.bootstrap5.min.css">
    
    <style>
        :root {
            --primary: #0f5b9c;
            --primary-dark: #1a4b7a;
            --primary-light: #e8f0fe;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e9ecef;
        }
        
        body {
            background: #f0f5fa;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            color: var(--dark);
        }
        
        .dashboard-container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        /* Header */
        .branch-header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .branch-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .branch-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }
        
        .branch-details h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-dark);
        }
        
        .branch-details p {
            margin: 5px 0 0;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* Refresh indicator */
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }
        
        .refresh-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .last-updated {
            font-size: 0.85rem;
            color: #64748b;
        }
        
        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .stat-icon.total {
            background: #e8f0fe;
            color: var(--primary);
        }
        
        .stat-icon.active {
            background: #e8f7ed;
            color: var(--success);
        }
        
        .stat-icon.inactive {
            background: #fee9e7;
            color: var(--danger);
        }
        
        .stat-icon.offices {
            background: #e8f0fe;
            color: var(--info);
        }
        
        .stat-info h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }
        
        .stat-info p {
            margin: 5px 0 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        /* Section Title */
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark);
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: var(--primary);
            font-size: 1.5rem;
        }
        
        .section-title .badge {
            background: var(--primary-light);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        
        /* Team Member Cards - Similar to statsContainer style */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .team-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(15, 91, 156, 0.15);
            border-color: var(--primary-light);
        }
        
        .team-card.active {
            border-left: 4px solid var(--success);
        }
        
        .card-header-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .profile-image {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(15, 91, 156, 0.2);
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-image i {
            font-size: 2.5rem;
            color: white;
        }
        
        .member-info {
            flex: 1;
        }
        
        .member-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }
        
        .member-designation {
            font-size: 0.85rem;
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 8px;
        }
        
        .member-office {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .card-details {
            margin-bottom: 15px;
        }
        
        .detail-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-icon {
            width: 32px;
            color: var(--primary);
            font-size: 1.1rem;
            text-align: center;
        }
        
        .detail-content {
            flex: 1;
            font-size: 0.9rem;
            color: var(--dark);
            word-break: break-all;
        }
        
        .detail-content a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .detail-content a:hover {
            text-decoration: underline;
        }
        
        .about-section {
            background: var(--light);
            border-radius: 12px;
            padding: 12px;
            margin-top: 12px;
            border-left: 3px solid var(--primary);
        }
        
        .about-section p {
            margin: 0;
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.5;
        }
        
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-active {
            background: #e8f7ed;
            color: #0b5e42;
        }
        
        .status-inactive {
            background: #fee9e7;
            color: #b91c1c;
        }
        
        /* Contact Buttons */
        .contact-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .contact-btn {
            flex: 1;
            padding: 8px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .contact-btn.call {
            background: var(--primary-light);
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        
        .contact-btn.call:hover {
            background: var(--primary);
            color: white;
        }
        
        .contact-btn.email {
            background: #e8f7ed;
            color: #0b5e42;
            border: 1px solid #a3e0b6;
        }
        
        .contact-btn.email:hover {
            background: #0b5e42;
            color: white;
            border-color: #0b5e42;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
            background: white;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--primary-light);
        }
        
        .refresh-btn {
            background: white;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .team-grid {
                grid-template-columns: 1fr;
            }
            
            .branch-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .card-header-area {
                flex-direction: column;
                text-align: center;
            }
            
            .member-info {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="branch-header">
            <div class="branch-info">
                <div class="branch-icon">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div class="branch-details">
                    <h1>NOC Team</h1>
                     <!--  <p>
                        <i class="bi bi-hdd-network"></i>
                     <span>Network Operations Center | 24x7 Support Team</span> 
                    </p> -->
                </div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="refresh-indicator">
                    <div class="refresh-spinner" id="refreshSpinner" style="display: none;"></div>
                    <span class="last-updated" id="lastUpdated">
                        <i class="bi bi-clock"></i> Auto-refresh every 5 min
                    </span>
                </div>
                <button class="refresh-btn" onclick="manualRefresh()" id="refreshBtn">
                    <i class="bi bi-arrow-repeat"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row" id="statsContainer">
            <div class="stat-card">
                <div class="stat-icon total">
                    <i class="bi bi-people"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalMembers">0</h3>
                    <p>Total Members</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon active">
                    <i class="bi bi-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h3 id="activeMembers">0</h3>
                    <p>Active Members</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon inactive">
                    <i class="bi bi-x-circle"></i>
                </div>
                <div class="stat-info">
                    <h3 id="inactiveMembers">0</h3>
                    <p>Inactive Members</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon offices">
                    <i class="bi bi-building"></i>
                </div>
                <div class="stat-info">
                    <h3 id="officeCount">0</h3>
                    <p>Offices</p>
                </div>
            </div>
        </div>

        <!-- Team Members Section -->
        <div class="section-title">
            <i class="bi bi-person-badge-fill"></i>
            Active Team Members
            <span class="badge" id="activeCount">0</span>
        </div>
        
        <div id="teamContainer">
            <div class="loading" id="teamLoading">
                <div class="spinner"></div>
                <p>Loading team members...</p>
            </div>
            <div id="teamGrid" class="team-grid" style="display: none;"></div>
            <div id="teamEmpty" class="empty-state" style="display: none;">
                <i class="bi bi-people-slash"></i>
                <h5 class="mt-3">No Active Team Members</h5>
                <p class="text-muted">No active team members found at this time.</p>
            </div>
        </div>
    </div>

    <!-- LOCAL JavaScript -->
    <script src="../js/jquery.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyBB1V3vJpNZ9X1GIF-YOwoa6YSt_iXMLo0';
        const SPREADSHEET_ID = '1jd1xZe9x2mrZm5KAwGT12vMNYjbrnynsmelNKeK95jc';
        const SHEET_NAME = 'team';
        
        let teamMembers = [];
        let activeMembers = [];
        let refreshInterval = null;
        let isRefreshing = false;
        
        $(document).ready(function() {
            console.log('NOC Team Dashboard loaded');
            loadTeamData();
            
            // Auto-refresh every 5 minutes
            refreshInterval = setInterval(function() {
                autoRefresh();
            }, 300000); // 5 minutes
        });
        
        function autoRefresh() {
            if (!isRefreshing) {
                console.log('Auto-refreshing team data...');
                $('#refreshSpinner').show();
                loadTeamData();
            }
        }
        
        function manualRefresh() {
            if (!isRefreshing) {
                $('#refreshBtn').prop('disabled', true);
                $('#refreshSpinner').show();
                loadTeamData();
            }
        }
        
        async function loadTeamData() {
            isRefreshing = true;
            showLoading(true);
            
            try {
                const range = `${SHEET_NAME}!A:I`;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
                console.log('Fetching team data from:', url);
                
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                console.log('Team data received:', data);
                
                if (!data.values || data.values.length < 2) {
                    throw new Error('No team data found');
                }
                
                processTeamData(data.values);
                updateStats();
                displayActiveMembers();
                updateLastUpdated();
                
            } catch (error) {
                console.error('Error loading team data:', error);
                showError('Failed to load team data: ' + error.message);
            } finally {
                isRefreshing = false;
                $('#refreshSpinner').hide();
                $('#refreshBtn').prop('disabled', false);
                showLoading(false);
            }
        }
        
        function processTeamData(rows) {
            const headers = rows[0].map(h => h ? h.toString().trim() : '');
            const dataRows = rows.slice(1);
            
            teamMembers = [];
            
            dataRows.forEach((row, index) => {
                if (row.length < 8) return;
                
                const member = {
                    name: row[0] ? row[0].toString().trim() : '',
                    designation: row[1] ? row[1].toString().trim() : '',
                    office: row[2] ? row[2].toString().trim() : '',
                    contact1: row[3] ? row[3].toString().trim() : '',
                    contact2: row[4] ? row[4].toString().trim() : '',
                    email: row[5] ? row[5].toString().trim() : '',
                    about: row[6] ? row[6].toString().trim() : '',
                    profileImage: row[7] ? row[7].toString().trim() : '',
                    active: row[8] ? row[8].toString().trim().toLowerCase() : ''
                };
                
                if (member.name) {
                    teamMembers.push(member);
                }
            });
            
            // Filter active members (active = "Yes")
            activeMembers = teamMembers.filter(member => member.active === 'yes');
            
            console.log(`Total members: ${teamMembers.length}, Active: ${activeMembers.length}`);
        }
        
        function updateStats() {
            const uniqueOffices = new Set(teamMembers.map(m => m.office).filter(o => o));
            
            $('#totalMembers').text(teamMembers.length);
            $('#activeMembers').text(activeMembers.length);
            $('#inactiveMembers').text(teamMembers.length - activeMembers.length);
            $('#officeCount').text(uniqueOffices.size);
            $('#activeCount').text(activeMembers.length);
        }
        
        function displayActiveMembers() {
            const $grid = $('#teamGrid');
            const $empty = $('#teamEmpty');
            const $loading = $('#teamLoading');
            
            $loading.hide();
            
            if (activeMembers.length === 0) {
                $grid.hide();
                $empty.show();
                return;
            }
            
            $empty.hide();
            $grid.show();
            $grid.empty();
            
            activeMembers.forEach(member => {
                // Format phone numbers for tel: links
                const contact1Clean = member.contact1 ? member.contact1.replace(/[^0-9+]/g, '') : '';
                const contact2Clean = member.contact2 ? member.contact2.replace(/[^0-9+]/g, '') : '';
                
                // Profile image handling
                let profileHtml = '';
                if (member.profileImage && member.profileImage.startsWith('http')) {
                    profileHtml = `<img src="${escapeHtml(member.profileImage)}" alt="${escapeHtml(member.name)}" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'bi bi-person-circle\'></i>';">`;
                } else {
                    profileHtml = `<i class="bi bi-person-circle"></i>`;
                }
                
                const card = `
                    <div class="team-card active">
                        <span class="status-badge status-active">
                            <i class="bi bi-circle-fill me-1" style="font-size: 0.5rem;"></i> Active
                        </span>
                        <div class="card-header-area">
                            <div class="profile-image">
                                ${profileHtml}
                            </div>
                            <div class="member-info">
                                <div class="member-name">${escapeHtml(member.name)}</div>
                                <div class="member-designation">${escapeHtml(member.designation)}</div>
                                <div class="member-office">
                                    <i class="bi bi-building"></i> ${escapeHtml(member.office)}
                                </div>
                            </div>
                        </div>
                        
                        <div class="card-details">
                            ${member.contact1 ? `
                            <div class="detail-row">
                                <div class="detail-icon"><i class="bi bi-telephone-fill"></i></div>
                                <div class="detail-content">
                                    <a href="tel:${escapeHtml(contact1Clean)}">${escapeHtml(member.contact1)}</a>
                                </div>
                            </div>
                            ` : ''}
                            
                            ${member.contact2 ? `
                            <div class="detail-row">
                                <div class="detail-icon"><i class="bi bi-phone-fill"></i></div>
                                <div class="detail-content">
                                    <a href="tel:${escapeHtml(contact2Clean)}">${escapeHtml(member.contact2)}</a>
                                </div>
                            </div>
                            ` : ''}
                            
                            ${member.email ? `
                            <div class="detail-row">
                                <div class="detail-icon"><i class="bi bi-envelope-fill"></i></div>
                                <div class="detail-content">
                                    <a href="mailto:${escapeHtml(member.email)}">${escapeHtml(member.email)}</a>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                        
                        ${member.about ? `
                        <div class="about-section">
                            <p><i class="bi bi-info-circle me-1"></i> ${escapeHtml(member.about)}</p>
                        </div>
                        ` : ''}
                        
                        <div class="contact-buttons">
                            ${member.contact1 ? `
                            <a href="tel:${escapeHtml(contact1Clean)}" class="contact-btn call">
                                <i class="bi bi-telephone"></i> Call
                            </a>
                            ` : ''}
                            ${member.email ? `
                            <a href="mailto:${escapeHtml(member.email)}" class="contact-btn email">
                                <i class="bi bi-envelope"></i> Email
                            </a>
                            ` : ''}
                        </div>
                    </div>
                `;
                $grid.append(card);
            });
        }
        
        function updateLastUpdated() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            const dateString = now.toLocaleDateString();
            $('#lastUpdated').html(`<i class="bi bi-clock"></i> Last updated: ${dateString} ${timeString} · Auto-refresh every 5 min`);
        }
        
        function showLoading(show) {
            if (show) {
                $('#teamLoading').show();
                $('#teamGrid').hide();
                $('#teamEmpty').hide();
            }
        }
        
        function showError(message) {
            $('#teamContainer').html(`
                <div class="empty-state" style="border-left: 4px solid var(--danger);">
                    <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
                    <h5 class="mt-3 text-danger">Error Loading Data</h5>
                    <p class="text-muted">${escapeHtml(message)}</p>
                    <button class="btn btn-primary mt-3" onclick="location.reload()">
                        <i class="bi bi-arrow-repeat"></i> Retry
                    </button>
                </div>
            `);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
        
        // Clean up interval when leaving page
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
